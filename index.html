<!DOCTYPE html>
<html>
<head>
    <title>WanderWorld Travel</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        .navbar {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-size: 18px;
        }

        .navbar a:hover {
            color: #00bcd4;
        }

        /* Hero Section */
        .hero {
            background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
            height: 400px;
            background-size: cover;
            color: white;
            text-align: center;
            padding-top: 150px;
        }

        .hero h1 {
            font-size: 50px;
        }

        /* Destinations */
        .destinations {
            padding: 40px;
            text-align: center;
        }

        .card {
            display: inline-block;
            width: 250px;
            margin: 20px;
            box-shadow: 0 0 10px gray;
            border-radius: 10px;
        }

        .card img {
            width: 100%;
            border-radius: 10px 10px 0 0;
        }

        .card h3 {
            padding: 10px;
        }

        /* Footer */
        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <a href="#">Home</a>
    <a href="#">Destinations</a>
    <a href="#">Contact</a>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Explore the World</h1>
    <p>Travel. Discover. Enjoy.</p>
</div>

<!-- Destinations -->
<div class="destinations">
    <h2>Popular Destinations</h2>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34">
        <h3>Paris</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1505761671935-60b3a7427bad">
        <h3>Maldives</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
        <h3>Mountains</h3>
    </div>

</div>

<!-- Footer -->
<div class="footer">
    <p>© 2026 WanderWorld Travel | All Rights Reserved</p>
</div>

</body>
</html>
